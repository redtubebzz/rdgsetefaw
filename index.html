<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Echo — Modern Messenger</title>
  <!-- Google Fonts & Simple Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e4e6eb;
    }

    /* main container — phone-like card */
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 90vh;
      background: #1e1f22;
      border-radius: 32px;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* header style */
    .header {
      background: #2b2d31;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #3c3f45;
      backdrop-filter: blur(10px);
    }

    .header h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff, #a0a3b0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-btn {
      background: #3c3f45;
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .back-btn:hover {
      background: #4e5159;
      transform: scale(0.96);
    }

    /* auth card */
    .auth-card {
      background: #2b2d31;
      margin: 30px 20px;
      padding: 28px 22px;
      border-radius: 32px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .auth-card h3 {
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.6rem;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: #1e1f22;
      border: 1px solid #3c3f45;
      border-radius: 24px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: #6c7aff;
      box-shadow: 0 0 0 2px rgba(108, 122, 255, 0.3);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .btn-primary {
      background: #6c7aff;
      border: none;
      padding: 12px 0;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      font-size: 0.9rem;
    }

    .btn-secondary {
      background: #3c3f45;
      border: none;
      padding: 12px 0;
      border-radius: 40px;
      font-weight: 500;
      color: #e4e6eb;
      cursor: pointer;
      flex: 1;
    }

    .btn-primary:hover {
      background: #5a68e0;
      transform: translateY(-1px);
    }

    .status-text {
      text-align: center;
      margin-top: 15px;
      font-size: 0.8rem;
      color: #b5bac1;
    }

    /* inbox/user list */
    .inbox-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .user-card {
      background: #2b2d31;
      margin: 12px 12px;
      padding: 14px 18px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .user-card:hover {
      background: #33363d;
      border-color: #6c7aff40;
      transform: translateX(3px);
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #6c7aff, #8f73ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .user-email {
      font-size: 0.7rem;
      color: #9aa0aa;
      margin-top: 3px;
    }

    /* chat area */
    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #1a1b1e;
    }

    .message-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 0.9rem;
      line-height: 1.35;
      word-wrap: break-word;
      animation: fadeSlideUp 0.2s ease;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-left {
      background: #2b2d31;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .message-right {
      background: #6c7aff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .input-area {
      background: #2b2d31;
      padding: 12px 16px 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-top: 1px solid #3c3f45;
    }

    .input-area input {
      flex: 1;
      background: #1e1f22;
      border: none;
      padding: 14px 18px;
      border-radius: 40px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }

    .send-icon {
      background: #6c7aff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .send-icon i {
      font-size: 1.2rem;
      color: white;
    }

    .send-icon:active {
      transform: scale(0.94);
    }

    /* empty states */
    .empty-msg {
      text-align: center;
      color: #6c727c;
      margin-top: 40px;
      font-size: 0.85rem;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1f22;
    }
    ::-webkit-scrollbar-thumb {
      background: #6c7aff80;
      border-radius: 5px;
    }

    /* popup notif modern */
    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2b2d31e6;
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
      z-index: 2000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      border-left: 3px solid #6c7aff;
      pointer-events: none;
      animation: floatUp 0.2s ease;
    }
    @keyframes floatUp {
      0% { opacity: 0; bottom: 0px; }
      100% { opacity: 1; bottom: 20px; }
    }

    .logout-icon {
      margin-left: auto;
      background: #3c3f45;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-icon:hover {
      background: #e34f4f;
    }

    .hide {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <!-- HEADER (dynamic) -->
  <div class="header" id="globalHeader">
    <div style="display: flex; align-items: center; gap: 8px;">
      <i class="fas fa-comment-dots" style="color:#6c7aff; font-size: 1.5rem;"></i>
      <h2>Echo</h2>
    </div>
    <div class="logout-icon" id="logoutBtn" style="display: none;">
      <i class="fas fa-sign-out-alt"></i>
    </div>
  </div>

  <!-- AUTH SECTION -->
  <div id="authSection" style="flex:1; overflow-y: auto;">
    <div class="auth-card">
      <h3><i class="fas fa-lock" style="font-size: 1.2rem;"></i>  welcome</h3>
      <div class="input-group">
        <input type="text" id="displayName" placeholder="Full name" autocomplete="off">
      </div>
      <div class="input-group">
        <input type="email" id="emailInput" placeholder="Email address">
      </div>
      <div class="input-group">
        <input type="password" id="passInput" placeholder="Password">
      </div>
      <div class="btn-group">
        <button class="btn-primary" id="signupBtn">Sign up</button>
        <button class="btn-secondary" id="loginBtn">Log in</button>
      </div>
      <div class="status-text" id="authStatus">✨ Secure & instant</div>
    </div>
  </div>

  <!-- INBOX PAGE (user list) -->
  <div id="inboxPage" style="flex:1; display: flex; flex-direction: column; overflow: hidden; display: none;">
    <div style="padding: 10px 20px 0 20px;">
      <p style="font-weight: 500; font-size: 0.8rem; color:#b5bac1;"><i class="fas fa-users"></i> Active contacts</p>
    </div>
    <div class="inbox-container" id="userListContainer">
      <div class="empty-msg">Loading conversations...</div>
    </div>
  </div>

  <!-- CHAT PAGE -->
  <div id="chatPage" style="flex:1; display: flex; flex-direction: column; overflow: hidden; display: none;">
    <div class="header" style="border-radius: 0; background: #2b2d31;">
      <button class="back-btn" id="chatBackBtn"><i class="fas fa-arrow-left"></i></button>
      <div style="flex:1;">
        <div id="chatPartnerName" style="font-weight: 600;">Contact</div>
        <div style="font-size: 0.7rem; color:#9aa0aa;"><i class="fas fa-circle" style="font-size: 0.45rem; color:#44b77b;"></i> online</div>
      </div>
      <div></div>
    </div>
    <div class="chat-messages-area" id="messagesContainer">
      <div class="empty-msg">✨ Say hi to your friend</div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Message...">
      <div class="send-icon" id="sendMsgBtn">
        <i class="fas fa-paper-plane"></i>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getFirestore, collection, doc, setDoc, getDocs, addDoc,
    onSnapshot, query, orderBy, serverTimestamp, where
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // Firebase config (original valid)
  const firebaseConfig = {
    apiKey: "AIzaSyCZR5ZzTAyz4z_OVwP0OYn_mTitc8cip8g",
    authDomain: "chat-app-fbd13.firebaseapp.com",
    projectId: "chat-app-fbd13",
    storageBucket: "chat-app-fbd13.firebasestorage.app",
    messagingSenderId: "617245566128",
    appId: "1:617245566128:web:be6145ca605ea96b8b4775"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const authSection = document.getElementById('authSection');
  const inboxPage = document.getElementById('inboxPage');
  const chatPage = document.getElementById('chatPage');
  const userListDiv = document.getElementById('userListContainer');
  const messagesContainer = document.getElementById('messagesContainer');
  const chatPartnerNameSpan = document.getElementById('chatPartnerName');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendMsgBtn');
  const backChatBtn = document.getElementById('chatBackBtn');
  const logoutIcon = document.getElementById('logoutBtn');
  const authStatus = document.getElementById('authStatus');

  // state
  let currentChatUserId = null;      // uid of chatting partner
  let currentChatUserName = "";
  let currentUnsubChat = null;       // cleanup listener

  // Helper: generate unique chat room id
  function getChatRoomId(uid1, uid2) {
    return [uid1, uid2].sort().join('_');
  }

  // Modern popup notification
  function showPopupMessage(text, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-notify';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-comment'}" style="margin-right:8px;"></i> ${text}`;
    if (isError) toast.style.borderLeftColor = "#ff6b6b";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // Load users list (exclude self)
  async function loadUsersList() {
    if (!auth.currentUser) return;
    const currentUid = auth.currentUser.uid;
    try {
      const usersSnap = await getDocs(collection(db, "users"));
      let usersArray = [];
      usersSnap.forEach(docSnap => {
        const userData = docSnap.data();
        if (userData.uid !== currentUid) {
          usersArray.push({ uid: userData.uid, name: userData.name, email: userData.email });
        }
      });
      if (usersArray.length === 0) {
        userListDiv.innerHTML = `<div class="empty-msg"><i class="fas fa-user-friends"></i> No other users yet</div>`;
        return;
      }
      userListDiv.innerHTML = usersArray.map(user => `
        <div class="user-card" data-uid="${user.uid}" data-name="${escapeHtml(user.name)}" data-email="${escapeHtml(user.email)}">
          <div class="avatar">${user.name.charAt(0).toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${escapeHtml(user.name)}</div>
            <div class="user-email">${escapeHtml(user.email)}</div>
          </div>
        </div>
      `).join('');
      // attach event listeners
      document.querySelectorAll('.user-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const uid = card.dataset.uid;
          const name = card.dataset.name;
          openChatWith(uid, name);
        });
      });
    } catch (err) {
      console.error(err);
      userListDiv.innerHTML = `<div class="empty-msg">⚠️ Couldn't load users</div>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // open chat screen
  function openChatWith(partnerUid, partnerName) {
    if (currentUnsubChat) currentUnsubChat();
    currentChatUserId = partnerUid;
    currentChatUserName = partnerName;
    chatPartnerNameSpan.innerText = partnerName;
    // switch ui
    inboxPage.style.display = 'none';
    chatPage.style.display = 'flex';
    messageInput.value = '';

    const roomId = getChatRoomId(auth.currentUser.uid, partnerUid);
    const messagesRef = collection(db, "chats", roomId, "messages");
    const q = query(messagesRef, orderBy("time", "asc"));

    // Real time snapshot with beautiful scroll & new msg notification (only if chat not focused)
    currentUnsubChat = onSnapshot(q, (snapshot) => {
      // detect new messages added while chat is open but possibly background?
      snapshot.docChanges().forEach(change => {
        if (change.type === "added") {
          const msgData = change.doc.data();
          // show popup only if message is from OTHER and current chat is this exact partner and chat page is visible
          if (msgData.sender !== auth.currentUser.uid && currentChatUserId === msgData.sender) {
            // chat screen is open, just gentle popup inside chat?
            if (document.getElementById('chatPage').style.display === 'flex') {
              showPopupMessage(`📩 New message from ${partnerName}`);
            }
          } else if (msgData.sender !== auth.currentUser.uid && currentChatUserId !== msgData.sender) {
            // Different chat: show generic notif
            showPopupMessage(`💬 New message from a contact`);
          }
        }
      });
      // render messages
      let html = '';
      snapshot.forEach(docMsg => {
        const msg = docMsg.data();
        const isMe = msg.sender === auth.currentUser.uid;
        if (isMe) {
          html += `<div class="message-bubble message-right">${escapeHtml(msg.text)}</div>`;
        } else {
          html += `<div class="message-bubble message-left">${escapeHtml(msg.text)}</div>`;
        }
      });
      if (html === "") html = `<div class="empty-msg"><i class="far fa-comment-dots"></i> No messages yet. Start a conversation!</div>`;
      messagesContainer.innerHTML = html;
      // scroll to bottom
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, (error) => {
      console.warn("Snapshot error:", error);
    });
  }

  // Send message
  async function sendMessage() {
    if (!currentChatUserId) return;
    const text = messageInput.value.trim();
    if (!text) return;
    const roomId = getChatRoomId(auth.currentUser.uid, currentChatUserId);
    try {
      await addDoc(collection(db, "chats", roomId, "messages"), {
        text: text,
        sender: auth.currentUser.uid,
        receiver: currentChatUserId,
        time: serverTimestamp()
      });
      messageInput.value = '';
      // scroll triggered by onSnapshot
    } catch (err) {
      showPopupMessage("Failed to send", true);
    }
  }

  // back to inbox
  function backToInbox() {
    if (currentUnsubChat) {
      currentUnsubChat();
      currentUnsubChat = null;
    }
    currentChatUserId = null;
    chatPage.style.display = 'none';
    inboxPage.style.display = 'flex';
    loadUsersList(); // refresh list for any new users
  }

  // logout
  async function logoutUser() {
    await signOut(auth);
    if (currentUnsubChat) currentUnsubChat();
    currentChatUserId = null;
    showPopupMessage("Signed out 👋");
  }

  // UI auth state handler
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // ensure display name in firestore users
      const userDocRef = doc(db, "users", user.uid);
      const userSnap = await getDocs(collection(db, "users"));
      let userExists = false;
      userSnap.forEach(d => { if (d.data().uid === user.uid) userExists = true; });
      if (!userExists) {
        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          name: user.displayName || "Anonymous",
          email: user.email
        });
      } else if (user.displayName) {
        // update name in case changed, but keep sync
        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          name: user.displayName,
          email: user.email
        }, { merge: true });
      }
      // show main UI
      authSection.style.display = 'none';
      inboxPage.style.display = 'flex';
      chatPage.style.display = 'none';
      logoutIcon.style.display = 'flex';
      loadUsersList();
      authStatus.innerText = `✔️ Logged in as ${user.displayName || user.email}`;
    } else {
      if (currentUnsubChat) currentUnsubChat();
      authSection.style.display = 'block';
      inboxPage.style.display = 'none';
      chatPage.style.display = 'none';
      logoutIcon.style.display = 'none';
      authStatus.innerText = "✨ Welcome back — login or signup";
    }
  });

  // SIGNUP logic
  document.getElementById('signupBtn').addEventListener('click', async () => {
    const name = document.getElementById('displayName').value.trim();
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passInput').value;
    if (!name || !email || password.length < 6) {
      showPopupMessage("Name, valid email & password (6+ chars)", true);
      return;
    }
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCred.user, { displayName: name });
      await setDoc(doc(db, "users", userCred.user.uid), {
        uid: userCred.user.uid,
        name: name,
        email: email
      });
      showPopupMessage(`Welcome ${name}! 🎉`);
    } catch (err) {
      showPopupMessage(err.message, true);
    }
  });

  // LOGIN
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passInput').value;
    if (!email || !password) {
      showPopupMessage("Enter email & password", true);
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showPopupMessage("Logged in successfully ✨");
    } catch (err) {
      showPopupMessage("Invalid credentials", true);
    }
  });

  // logout button click
  logoutIcon.addEventListener('click', logoutUser);

  // send message events
  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  backChatBtn.addEventListener('click', backToInbox);

  // small style to fix overflow of header
  const styleFix = document.createElement('style');
  styleFix.textContent = `#appRoot { position: relative; } .header { flex-shrink: 0; }`;
  document.head.appendChild(styleFix);
  console.log("🔥 Modern messenger ready — Firebase realtime chat");
</script>
</body>
</html>
